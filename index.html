<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Nanum+Gothic&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="toggle-container">
        <input type="checkbox" id="theme-toggle" />
        <label
          for="theme-toggle"
          class="toggle-slider"
          aria-label="Alternar tema"
        ></label>
      </div>
    </header>
    <main>
      <section aria-labelledby="quem-assistindo">
        <h1 id="quem-assistindo">Quem está assistindo?</h1>
        <ul class="profiles">
          <!-- Perfis de usuário -->
          <li class="profile">
            <a href="catalogo/catalogo.html">
              <figure>
                <img src="Assets/neymar.png" alt="Foto do perfil GabrielF" />
                <figcaption class="nome-perfil">GabrielF</figcaption>
              </figure>
            </a>
          </li>
          <li class="profile">
            <a href="catalogo/catalogo.html">
              <figure>
                <img
                  src="Assets/ViniciusJr.png"
                  alt="Foto do perfil TharciaC"
                />
                <figcaption class="nome-perfil">TharciaC</figcaption>
              </figure>
            </a>
          </li>
          <li class="profile">
            <a href="catalogo/catalogo.html">
              <figure>
                <img src="Assets/ronaldinho.png" alt="Foto do perfil Miguel" />
                <figcaption class="nome-perfil">Miguel</figcaption>
              </figure>
            </a>
          </li>
          <li class="profile">
            <a href="catalogo/catalogo.html">
              <figure>
                <img src="Assets/ronaldo.png" alt="Foto do perfil Eros" />
                <figcaption class="nome-perfil">Eros</figcaption>
              </figure>
            </a>
          </li>
        </ul>
        <button class="manage-profiles-btn" aria-label="Gerenciar perfis">
          Gerenciar perfis
        </button>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
